<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur | ChatBOT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container mt-5">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <div class="card-body p-0 d-flex flex-column">
                <div id="chat-box" class="p-3 overflow-auto" style="height: 500px;">
                    <!-- As mensagens serão inseridas aqui -->
                </div>
                <div class="input-group p-2">
                    <input type="text" class="form-control" id="user-input" placeholder="Digite sua mensagem...">
                    <button class="btn btn-warning" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

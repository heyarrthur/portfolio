<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Simples</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Loja Simples</h1>
        <div id="produtos">
            <div class="produto">
                <h2>Notebook</h2>
                <p>Preço: R$ 3000,00</p>
                <button onclick="adicionarCarrinho(1, 'Notebook', 3000)">Adicionar ao Carrinho</button>
            </div>
            <div class="produto">
                <h2>Mouse</h2>
                <p>Preço: R$ 50,00</p>
                <button onclick="adicionarCarrinho(2, 'Mouse', 50)">Adicionar ao Carrinho</button>
            </div>
            <div class="produto">
                <h2>Teclado</h2>
                <p>Preço: R$ 150,00</p>
                <button onclick="adicionarCarrinho(3, 'Teclado', 150)">Adicionar ao Carrinho</button>
            </div>
        </div>

        <h2>Carrinho</h2>
        <ul id="carrinho"></ul>
        <p>Total: R$ <span id="total">0.00</span></p>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
